<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Vehicle Service Booking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Vehicle Service Booking</h2>

<div class="row mb-3">

<div class="col-md-6">
<a th:href="@{/showNewBookingForm}" class="btn btn-success">Add Booking</a>
</div>

<div class="col-md-6">

<form th:action="@{/search}" method="get">

<div class="input-group">

<input type="text" name="keyword" class="form-control"
placeholder="Search by Vehicle Number">

<button class="btn btn-primary">Search</button>

</div>

</form>

</div>

</div>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Customer</th>
<th>Vehicle</th>
<th>Service</th>
<th>Date</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

<tr th:each="booking : ${listBookings}">

<td th:text="${booking.id}"></td>
<td th:text="${booking.customerName}"></td>
<td th:text="${booking.vehicleNumber}"></td>
<td th:text="${booking.serviceType}"></td>
<td th:text="${booking.bookingDate}"></td>

<td>

<a th:href="@{/showFormForUpdate/{id}(id=${booking.id})}"
class="btn btn-primary btn-sm">Edit</a>

<a th:href="@{/deleteBooking/{id}(id=${booking.id})}"
class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

</tbody>

</table>

<!-- Pagination -->

<nav>

<ul class="pagination justify-content-center">

<li class="page-item"
th:each="i : ${#numbers.sequence(1,totalPages)}">

<a class="page-link"
th:href="@{'/page/' + ${i}}"
th:text="${i}">

</a>

</li>

</ul>

</nav>

</div>

</body>

</html>
