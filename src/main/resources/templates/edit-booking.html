<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Edit Booking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card">

<div class="card-header bg-primary text-white">

<h4>Edit Vehicle Service Booking</h4>

</div>

<div class="card-body">

<form th:action="@{/saveBooking}" th:object="${booking}" method="POST">

<input type="hidden" th:field="*{id}">

<div class="mb-3">

<label class="form-label">Customer Name</label>

<input type="text" th:field="*{customerName}" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Vehicle Number</label>

<input type="text" th:field="*{vehicleNumber}" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Service Type</label>

<select th:field="*{serviceType}" class="form-control">

<option value="Full Service">Full Service</option>
<option value="Oil Change">Oil Change</option>
<option value="Engine Repair">Engine Repair</option>
<option value="General Checkup">General Checkup</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Booking Date</label>

<input type="date" th:field="*{bookingDate}" class="form-control">

</div>

<button type="submit" class="btn btn-primary">Update Booking</button>

<a th:href="@{/}" class="btn btn-secondary">Back</a>

</form>

</div>

</div>

</div>

</body>

</html>
